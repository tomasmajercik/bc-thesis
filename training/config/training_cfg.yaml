# Training
train_ratio: 0.70
val_ratio: 0.20
batch_size: 4
num_epochs: 30
optimizer: "adam"
learning_rate: 5e-5
weight_decay: 1e-4
image_scale: 0.5   # 1.0 = full, 0.5 = half size

# Model
model_size: 1 # 0.5 = small, 1 = base, 2 = large, etc.
use_lstm: false # whether to use LSTM or not

# Loss fn
nonzero_weight: 50.0
sparsity_weight: 1.0
# top_k_frac: 0.05 # for ChamferHeatmapLoss
alpha: 0.2 # for TverskyLoss
beta: 0.8  # for TverskyLoss

# Metrics
return_coords: true
kld_weight: 0.5
emd_weight: 20.0
eps: 1e-8

# Dataset
dataset: "pets" # pets, stmarc, sherbrooke, atrium, rouen, mots16_02

wandb:
  use_wandb: true
  project: "bc-thesis"
  run_name: "New-TverskyLoss"
  log_interval: 1 # every N epoch
  group: "length-thickness-experiments" 

debug: false